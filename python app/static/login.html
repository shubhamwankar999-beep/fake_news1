<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fake News Guard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background: #0f172a;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
        }

        .auth-card {
            padding: 40px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #e2e8f0;
        }

        .auth-card input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .auth-card input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .toggle-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .toggle-text a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .logo-shield {
            font-size: 2.5rem;
        }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }

        .logo-section h1 span {
            color: #3b82f6;
        }

        .hidden {
            display: none;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <span class="logo-shield">🛡️</span>
            <h1>Fake News <span>Guard</span></h1>
        </div>

        <div class="glass-card auth-card">
            <div id="statusMsg" class="message hidden"></div>

            <!-- Login Form -->
            <div id="loginForm">
                <h2>Welcome Back</h2>
                <p>Verify your identity via OTP</p>
                
                <div class="input-group">
                    <label>Email Address</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="email" id="loginEmail" placeholder="e.g. user@example.com">
                        <button id="getOtpBtn" class="secondary-btn" style="white-space: nowrap;">Get OTP</button>
                    </div>
                </div>

                <div id="otpSection" class="hidden">
                    <div class="input-group">
                        <label>Enter 6-Digit OTP</label>
                        <input type="text" id="loginOtp" placeholder="000000" maxlength="6">
                    </div>
                    <div id="timerDisplay" style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem;">OTP expires in: <span id="timerCount">05:00</span></div>
                    <button id="verifyOtpBtn" class="primary-btn">Verify & Sign In</button>
                </div>

                <p class="toggle-text">New to the platform? <a href="#" id="toSignup">Create an Account</a></p>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="hidden">
                <h2>Create Account</h2>
                <p>Join the fight against misinformation</p>
                
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Your Name">
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="Your Email Address">
                </div>

                <button id="signupBtn" class="primary-btn">Create Account</button>
                
                <p class="toggle-text">Already have an account? <a href="#" id="toLogin">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="login.js?v=2"></script>
</body>
</html>
